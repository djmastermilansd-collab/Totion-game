<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Select</title>
<style>
body {
  margin:0;
  background:#111;
  color:white;
  text-align:center;
}

#menu {
  padding-top:50px;
}

.bird-option {
  width:70px;
  height:70px;
  margin:10px;
  border-radius:50%;
  display:inline-block;
  cursor:pointer;
}

#bird1 { background: yellow; }
#bird2 { background: red; }
#bird3 { background: blue; }

canvas {
  display:none;
  background:#70c5ce;
  margin:auto;
}
</style>
</head>
<body>

<div id="menu">
  <h1>Select Your Bird</h1>

  <div id="bird1" class="bird-option" onclick="startGame('yellow')"></div>
  <div id="bird2" class="bird-option" onclick="startGame('red')"></div>
  <div id="bird3" class="bird-option" onclick="startGame('blue')"></div>
</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
let selectedColor = null;

function startGame(color){
  selectedColor = color;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('gameCanvas').style.display = 'block';
  initGame();
}

function initGame(){
  const canvas = document.getElementById("gameCanvas");
  const birdImg = new Image();
birdImg.src = "bird.png";
  const ctx = canvas.getContext("2d");
const birdImg = new Image();
birdImg.src = "bird.png";
  let bird = {
    x: 80,
    y: 300,
    width: 30,
    height: 30,
    gravity: 0.5,
    lift: -8,
    velocity: 0
  };

  let pipes = [];
  let score = 0;
  let gameOver = false;

 function drawBird(){
  ctx.drawImage(birdImg, bird.x, bird.y, bird.width, bird.height);
}
  function drawPipes(){
    ctx.fillStyle = "green";
    pipes.forEach(pipe => {
      ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
      ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipe.width, pipe.bottom);
    });
  }

  function update(){
    if(gameOver) return;

    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if(bird.y + bird.height > canvas.height || bird.y < 0){
      endGame();
    }

    pipes.forEach(pipe => {
      pipe.x -= 2;

      if(
        bird.x < pipe.x + pipe.width &&
        bird.x + bird.width > pipe.x &&
        (bird.y < pipe.top || bird.y + bird.height > canvas.height - pipe.bottom)
      ){
        endGame();
      }

      if(pipe.x + pipe.width === bird.x){
        score++;
      }
    });

    pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
  }

  function endGame(){
    gameOver = true;
    alert("Game Over! Score: " + score);
    location.reload();
  }

  function spawnPipe(){
    let top = Math.random() * 200 + 50;
    let gap = 150;
    pipes.push({
      x: canvas.width,
      width: 50,
      top: top,
      bottom: canvas.height - top - gap
    });
  }

  setInterval(spawnPipe, 2000);

  function drawScore(){
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("Score: " + score, 10, 40);
  }

  function gameLoop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBird();
    drawPipes();
    drawScore();
    update();
    requestAnimationFrame(gameLoop);
  
// PC keyboard
document.addEventListener("keydown", function(e){
  if(e.code === "Space"){
    bird.velocity = bird.lift;
  }
});

// Mobile tap
document.addEventListener("touchstart", function(){
  bird.velocity = bird.lift;
});
  

  birdImg.onload = function(){
  gameLoop();
};
}
</script>

</body>
</html>
